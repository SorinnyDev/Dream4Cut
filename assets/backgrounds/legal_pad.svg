<svg width="400" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deeper, more iconic Legal Pad Yellow -->
  <rect width="100%" height="100%" fill="#FFF59D"/>
  
  <!-- Subtle Paper Grain/Noise simulation with a gradient -->
  <rect width="100%" height="100%" fill="url(#paperGradient)" opacity="0.3"/>
  <defs>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FBC02D;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Horizontal Blue Lines (Much more distinct) -->
  <defs>
    <pattern id="horizontalLines" width="100%" height="32" patternUnits="userSpaceOnUse">
      <line x1="0" y1="32" x2="400" y2="32" stroke="#81D4FA" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#horizontalLines)"/>
  
  <!-- Vertical Double Red Margin Lines -->
  <line x1="60" y1="0" x2="60" y2="100%" stroke="#EF9A9A" stroke-width="1.2"/>
  <line x1="64" y1="0" x2="64" y2="100%" stroke="#EF9A9A" stroke-width="0.5" opacity="0.6"/>

  <!-- Top Binding Detail: Makes it look like a real product -->
  <rect width="100%" height="15" fill="#795548" opacity="0.8"/>
  <rect width="100%" height="3" y="15" fill="#4E342E" opacity="0.3"/>
</svg>
